<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Villana FM - Player</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://extassisnetwork.com/player/Luna/luna.js"></script>
    
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            background: transparent !important; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }

        #villana-container {
            width: 360px !important;
            height: 450px !important;
            background: rgba(0, 0, 0, 0.9); /* Fondo negro profundo */
            border-radius: 25px;
            /* Neón Naranja Pro #FF5E00 */
            border: 3px solid #FF5E00;
            box-shadow: 0 0 20px rgba(255, 94, 0, 0.6), 0 10px 40px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Efecto 3D al pasar el mouse */
        #villana-container:hover {
            transform: scale(1.03) translateY(-5px);
            box-shadow: 0 0 30px rgba(255, 94, 0, 0.8), 0 15px 50px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

    <div id="villana-container">
        <div id="radio-player"></div>
    </div>

    <script>
        jQuery("#radio-player").lunaradio({
            streamurl: "https://radio.villasnafm.org/stream",
            radioname: "Villana FM",
            userinterface: "big",
            backgroundcolor: "transparent", 
            fontcolor: "#ffffff",
            hightlightcolor: "#FF5E00", /* Naranja en botones y visualizador */
            fontname: "Be Vietnam",
            googlefont: "Be Vietnam",
            fontratio: "0.4",
            scroll: "true",
            coverstyle: "animated",
            usevisualizer: "real",
            visualizertype: "6",
            streamtype: "shoutcast2",
            shoutcastpath: "/stream",
            shoutcastid: "1",
            metadatainterval: "5000",
            volume: "100",
            usestreamcorsproxy: "true"
        });
    </script>
</body>
</html>
