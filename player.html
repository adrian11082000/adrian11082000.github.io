<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Villana FM Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --villana-red: #E31E24;
            --villana-black: #000000;
            --villana-glow: rgba(227, 30, 36, 0.5);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: transparent; /* Se adapta al fondo de tu web */
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .player-card {
            background: linear-gradient(145deg, #1a1a1a, #000000);
            width: 90%;
            max-width: 400px;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 20px var(--villana-glow);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .logo-area {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            background: var(--villana-black);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid var(--villana-red);
            box-shadow: 0 0 15px var(--villana-red);
            overflow: hidden;
        }

        .logo-area img {
            width: 80%;
            height: auto;
        }

        .status {
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 3px;
            color: var(--villana-red);
            margin-bottom: 10px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }

        .radio-name {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .freq {
            font-size: 18px;
            color: #888;
            margin-bottom: 25px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .play-btn {
            background: var(--villana-red);
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px var(--villana-red);
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px var(--villana-red);
        }

        .play-btn svg {
            width: 35px;
            fill: white;
        }

        .volume-container {
            margin-top: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type=range] {
            flex-grow: 1;
            accent-color: var(--villana-red);
            cursor: pointer;
        }

        /* Visualizador de ondas simplificado */
        .waves {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 40px;
            gap: 3px;
            margin-top: 20px;
        }

        .bar {
            width: 4px;
            background: var(--villana-red);
            border-radius: 2px;
            animation: wave 1s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { height: 5px; }
            50% { height: 30px; }
        }
    </style>
</head>
<body>

<div class="player-card">
    <div class="status">● En Vivo</div>
    <div class="logo-area">
        <img src="https://adrian11082000.github.io/logo.png" alt="Villana FM">
    </div>
    <div class="radio-name">VILLANA FM</div>
    <div class="freq">103.3 MHz</div>

    <div class="controls">
        <button class="play-btn" id="playPauseBtn" onclick="togglePlay()">
            <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg id="pauseIcon" style="display:none;" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
    </div>

    <div class="volume-container">
        <svg style="width:20px; fill:#888" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        <input type="range" id="volume" min="0" max="1" step="0.1" value="1" oninput="changeVolume(this.value)">
    </div>

    <div class="waves" id="waveContainer" style="display:none;">
        <div class="bar" style="animation-delay: 0.1s"></div>
        <div class="bar" style="animation-delay: 0.2s"></div>
        <div class="bar" style="animation-delay: 0.3s"></div>
        <div class="bar" style="animation-delay: 0.4s"></div>
        <div class="bar" style="animation-delay: 0.5s"></div>
    </div>
</div>

<audio id="audioStream" src="https://radio.villasnafm.org/stream"></audio>

<script>
    const audio = document.getElementById('audioStream');
    const playIcon = document.getElementById('playIcon');
    const pauseIcon = document.getElementById('pauseIcon');
    const waveContainer = document.getElementById('waveContainer');

    function togglePlay() {
        if (audio.paused) {
            // Recargamos el stream para que sea en tiempo real
            audio.load();
            audio.play().then(() => {
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                waveContainer.style.display = 'flex';
            }).catch(e => {
                alert("Error: Asegúrate de que el stream sea HTTPS o intenta en otro navegador.");
            });
        } else {
            audio.pause();
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
            waveContainer.style.display = 'none';
        }
    }

    function changeVolume(val) {
        audio.volume = val;
    }
</script>

</body>
</html>
