<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            background: transparent !important; 
            overflow: hidden; 
            height: 100%; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #villana-radio { 
            width: 360px !important; 
            height: 450px !important;
            border-radius: 20px;
            /* Sombra Neón más fuerte para fondo blanco */
            box-shadow: 0 10px 30px rgba(227, 30, 36, 0.6), 0 0 15px #E31E24; 
            border: 3px solid #E31E24;
            background-color: #000000; /* El reproductor en sí sigue siendo negro para que luzca */
            transform: perspective(1000px) rotateX(5deg); /* Efecto leve de inclinación 3D */
        }
    </style>
</head>
<body>
    <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
    <script src="https://extassisnetwork.com/player/Luna/luna.js"></script>
    
    <div id="villana-radio"></div>
    
    <script>
        jQuery("#villana-radio").lunaradio({
            streamurl: "https://radio.villasnafm.org/stream",
            radioname: "Villana Fm",
            userinterface: "big",
            backgroundcolor: "#000000", 
            fontcolor: "#ffffff",
            hightlightcolor: "#E31E24",
            fontratio: "0.4",
            usevisualizer: "real",
            visualizertype: "6",
            streamtype: "shoutcast2",
            shoutcastpath: "/stream",
            shoutcastid: "1",
            usestreamcorsproxy: "true",
        });
    </script>
</body>
</html>
