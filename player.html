<!DOCTYPE html>
<html>
<head>
    <style>
        /* Hacemos el fondo transparente */
        body, html { 
            margin: 0; 
            padding: 0; 
            background: transparent !important; 
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Creamos el efecto 3D y Neón alrededor del contenedor */
        #villana-radio { 
            width: 90% !important; 
            max-width: 400px;
            border-radius: 20px;
            /* Sombra roja neón para efecto 3D flotante */
            box-shadow: 0 0 20px #E31E24, 0 0 40px rgba(227, 30, 36, 0.3);
            border: 1px solid rgba(227, 30, 36, 0.5);
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        #villana-radio:hover {
            transform: scale(1.02); /* Pequeño efecto de acercamiento al tocarlo */
        }
    </style>
</head>
<body>
    <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
    <script src="https://extassisnetwork.com/player/Luna/luna.js"></script>
    
    <div id="villana-radio"></div>
    
    <script>
        jQuery("#villana-radio").lunaradio({
            streamurl: "https://radio.villasnafm.org/stream",
            radioname: "Villana Fm",
            userinterface: "big",
            backgroundcolor: "rgba(0,0,0,0.7)", // Negro semitransparente para que se vea el neón detrás
            fontcolor: "#ffffff",
            hightlightcolor: "#E31E24",
            fontratio: "0.4",
            usevisualizer: "real",
            visualizertype: "6",
            streamtype: "shoutcast2",
            shoutcastpath: "/stream",
            shoutcastid: "1",
            usestreamcorsproxy: "true",
        });
    </script>
</body>
</html>
