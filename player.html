<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            background: transparent !important; 
            overflow: hidden; 
            height: 100%; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #villana-radio { 
            width: 360px !important; /* Tamaño fijo para que no se deforme */
            height: 450px !important;
            border-radius: 20px;
            box-shadow: 0 0 30px #E31E24; /* El neón rojo */
            border: 2px solid #E31E24;
        }
    </style>
</head>
<body>
    <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
    <script src="https://extassisnetwork.com/player/Luna/luna.js"></script>
    
    <div id="villana-radio"></div>
    
    <script>
        jQuery("#villana-radio").lunaradio({
            streamurl: "https://radio.villasnafm.org/stream",
            radioname: "Villana Fm",
            userinterface: "big",
            backgroundcolor: "rgba(0,0,0,0.9)", 
            fontcolor: "#ffffff",
            hightlightcolor: "#E31E24",
            fontratio: "0.4",
            usevisualizer: "real",
            visualizertype: "6",
            streamtype: "shoutcast2",
            shoutcastpath: "/stream",
            shoutcastid: "1",
            usestreamcorsproxy: "true",
        });
    </script>
</body>
</html>
