<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
    <script src="https://extassisnetwork.com/player/Luna/luna.js"></script>
    <style>
        body, html { margin: 0; padding: 0; background: transparent; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        #wrapper {
            width: 360px; height: 450px;
            background: #000000;
            border-radius: 25px;
            border: 3px solid #FF5E00;
            box-shadow: 0 0 20px #FF5E00;
        }
    </style>
</head>
<body>
    <div id="wrapper">
        <div id="luna-player"></div>
    </div>
    <script>
        $(document).ready(function() {
            $("#luna-player").lunaradio({
                streamurl: "https://radio.villasnafm.org/stream",
                radioname: "Villana FM",
                userinterface: "big",
                backgroundcolor: "rgba(0,0,0,0)",
                fontcolor: "#ffffff",
                hightlightcolor: "#FF5E00",
                fontratio: "0.5",
                usevisualizer: "fake", /* Cambiado a fake para forzar la carga rápida */
                visualizertype: "1",
                streamtype: "shoutcast2",
                shoutcastpath: "/stream",
                shoutcastid: "1",
                usestreamcorsproxy: "true", /* Esto es lo que ayuda a que no se quede negro */
                volume: "100"
            });
        });
    </script>
</body>
</html>
